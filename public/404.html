<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Single Page App</title>
    <script type="text/javascript">
      /**
       * GitHub Pages 404 Redirect for Single Page Applications (SPA)
       * 
       * This script handles routing for Vue Router (or similar SPA frameworks)
       * when using GitHub Pages, which doesn't support history.pushState fallback.
       * 
       * HOW IT WORKS:
       * 1. User visits /monitoring (or any other route)
       * 2. GitHub Pages can't find /monitoring/index.html, so it returns 404
       * 3. GitHub Pages serves this 404.html file
       * 4. This script encodes the requested path and redirects to /?p=monitoring
       * 5. index.html's redirect script decodes this and restores /monitoring in the URL
       * 6. Vue Router then handles the correct route
       * 
       * pathSegmentsToKeep = 0 means we keep only the domain root
       * (useful if your app is at the root of your domain)
       */
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <!-- This page should redirect immediately via JavaScript above -->
  </body>
</html>
